<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбери сторону — Звёздные Войны</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  font-family: 'Russo One', sans-serif;
  overflow: hidden;
  height: 100vh;
}

#stars-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

nav {
  position: fixed;
  top: 0; width: 100%;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-logo {
  font-size: 1.4rem;
  color: #FFE81F;
  text-decoration: none;
  letter-spacing: 3px;
  text-shadow: 0 0 20px #FFE81F88;
}

.nav-links {
  display: flex;
  gap: 30px;
  list-style: none;
}

.nav-links a {
  color: #FFE81F;
  text-decoration: none;
  font-size: 0.9rem;
  letter-spacing: 2px;
  opacity: 0.8;
  transition: opacity 0.3s, text-shadow 0.3s;
}

.nav-links a:hover {
  opacity: 1;
  text-shadow: 0 0 15px #FFE81F;
}

.choose-container {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.side {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-decoration: none;
  transition: all 0.5s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.side::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transition: opacity 0.5s;
  opacity: 0;
}

.dark-side {
  background: linear-gradient(135deg, #0a0000, #000);
  border-right: 1px solid #ff333322;
}

.dark-side::before {
  background: radial-gradient(ellipse at center, #ff000022, transparent 70%);
}

.light-side {
  background: linear-gradient(135deg, #00000a, #000);
  border-left: 1px solid #4488ff22;
}

.light-side::before {
  background: radial-gradient(ellipse at center, #4488ff22, transparent 70%);
}

.dark-side:hover {
  background: linear-gradient(135deg, #1a0000, #0d0000);
}

.light-side:hover {
  background: linear-gradient(135deg, #00000f, #000008);
}

.dark-side:hover::before,
.light-side:hover::before {
  opacity: 1;
}

.side-divider {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  pointer-events: none;
}

.divider-line {
  width: 2px;
  height: 100vh;
  background: linear-gradient(to bottom,
    transparent,
    #FFE81F44,
    #FFE81F,
    #FFE81F44,
    transparent
  );
  position: fixed;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  z-index: 5;
}

.or-text {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  background: #000;
  border: 2px solid #FFE81F;
  color: #FFE81F;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #FFE81F;
  box-shadow: 0 0 30px #FFE81F44;
  pointer-events: none;
}

.side-title {
  font-size: clamp(1.8rem, 4vw, 3rem);
  letter-spacing: 5px;
  margin-bottom: 30px;
  text-align: center;
  transition: text-shadow 0.3s;
}

.dark-side .side-title {
  color: #ff3333;
  text-shadow: 0 0 20px #ff333366;
}

.light-side .side-title {
  color: #4488ff;
  text-shadow: 0 0 20px #4488ff66;
}

.dark-side:hover .side-title {
  text-shadow: 0 0 40px #ff3333, 0 0 80px #ff333344;
}

.light-side:hover .side-title {
  text-shadow: 0 0 40px #4488ff, 0 0 80px #4488ff44;
}

.saber {
  width: 8px;
  border-radius: 4px;
  margin-bottom: 40px;
  position: relative;
  transition: height 0.5s ease, box-shadow 0.5s;
}

.dark-saber {
  height: 120px;
  background: linear-gradient(to top, #ff0000, #ff6666, #fff);
  box-shadow: 0 0 20px #ff0000, 0 0 40px #ff000044;
}

.light-saber {
  height: 120px;
  background: linear-gradient(to top, #0044ff, #4488ff, #fff);
  box-shadow: 0 0 20px #0044ff, 0 0 40px #0044ff44;
}

.dark-side:hover .dark-saber {
  height: 200px;
  box-shadow: 0 0 30px #ff0000, 0 0 60px #ff000066, 0 0 100px #ff000033;
}

.light-side:hover .light-saber {
  height: 200px;
  box-shadow: 0 0 30px #0044ff, 0 0 60px #0044ff66, 0 0 100px #0044ff33;
}

.saber-handle {
  width: 18px;
  height: 50px;
  background: linear-gradient(to bottom, #666, #333, #666);
  border-radius: 4px;
  margin: 0 auto;
  border: 1px solid #888;
}

.side-chars {
  text-align: center;
  margin-top: 30px;
}

.side-chars p {
  font-size: 0.8rem;
  letter-spacing: 3px;
  margin-bottom: 10px;
  opacity: 0.5;
}

.side-chars span {
  display: block;
  font-size: 0.85rem;
  letter-spacing: 2px;
  opacity: 0.7;
  margin-bottom: 5px;
}

.dark-side .side-chars span { color: #ff6666; }
.light-side .side-chars span { color: #88aaff; }

.side-quote {
  position: absolute;
  bottom: 40px;
  font-size: 0.75rem;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.4s;
  text-align: center;
  padding: 0 20px;
}

.dark-side .side-quote { color: #ff6666; }
.light-side .side-quote { color: #88aaff; }

.dark-side:hover .side-quote,
.light-side:hover .side-quote {
  opacity: 0.8;
}

.side-arrow {
  position: absolute;
  bottom: 80px;
  font-size: 1.5rem;
  opacity: 0;
  transition: opacity 0.4s, transform 0.4s;
  transform: translateY(10px);
}

.dark-side:hover .side-arrow,
.light-side:hover .side-arrow {
  opacity: 1;
  transform: translateY(0);
}

/* OVERLAY при клике */
.transition-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s;
}

.transition-overlay.active {
  opacity: 1;
  pointer-events: all;
}

@media (max-width: 600px) {
  .choose-container {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr 1fr;
    overflow-y: hidden;
  }
  .divider-line {
    width: 100%;
    height: 2px;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    background: linear-gradient(to right, transparent, #FFE81F, transparent);
  }
  .or-text {
    top: 50%;
    left: 50%;
  }
  .nav-links { display: none; }
}

</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="divider-line"></div>
<div class="or-text">ИЛИ</div>

<div id="overlay" class="transition-overlay"></div>

<nav>
  <a href="index.html" class="nav-logo">⭐ SW</a>
  <ul class="nav-links">
    <li><a href="index.html">ГЛАВНАЯ</a></li>
    <li><a href="choose.html">ВЫБОР СТОРОНЫ</a></li>
    <li><a href="films.html">ФИЛЬМЫ</a></li>
  </ul>
</nav>

<div class="choose-container">

  <!-- ТЁМНАЯ СТОРОНА -->
  <div class="dark-side side" onclick="goTo('dark.html', '#ff0000')">
    <h1 class="side-title">ТЁМНАЯ<br>СТОРОНА</h1>
    <div class="dark-saber saber"></div>
    <div class="saber-handle"></div>
    <div class="side-chars">
      <p>ИЗВЕСТНЫЕ СИТХИ</p>
      <span>ДАРТ ВЕЙДЕР</span>
      <span>ДАРТ СИДИУС</span>
      <span>ДАРТ МОЛ</span>
      <span>ГРАФ ДУК</span>
    </div>
    <div class="side-quote">"Я ТВОЙ ОТЕЦ"</div>
    <div class="side-arrow">→</div>
  </div>

  <!-- СВЕТЛАЯ СТОРОНА -->
  <div class="light-side side" onclick="goTo('light.html', '#0044ff')">
    <h1 class="side-title">СВЕТЛАЯ<br>СТОРОНА</h1>
    <div class="light-saber saber"></div>
    <div class="saber-handle"></div>
    <div class="side-chars">
      <p>ИЗВЕСТНЫЕ ДЖЕДАИ</p>
      <span>ЛЮК СКАЙУОКЕР</span>
      <span>ЙОДА</span>
      <span>ОБИ-ВАН КЕНОБИ</span>
      <span>ЭНАКИН СКАЙУОКЕР</span>
    </div>
    <div class="side-quote">"ДА ПРЕБУДЕТ С ТОБОЙ СИЛА"</div>
    <div class="side-arrow">←</div>
  </div>

</div>

<script>
// ЗВЁЗДЫ
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for (let i = 0; i < 250; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8,
    speed: Math.random() * 0.2 + 0.05,
    opacity: Math.random(),
    twinkle: Math.random() * 0.02 + 0.005,
    twinkleDir: Math.random() > 0.5 ? 1 : -1,
    yellow: Math.random() > 0.75
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    star.opacity += star.twinkle * star.twinkleDir;
    if (star.opacity >= 1 || star.opacity <= 0.1) star.twinkleDir *= -1;
    star.y += star.speed;
    if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    if (star.yellow && star.r > 1) {
      ctx.fillStyle = `rgba(255, 232, 31, ${star.opacity})`;
      ctx.shadowColor = '#FFE81F';
      ctx.shadowBlur = 8;
    } else {
      ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
      ctx.shadowBlur = 0;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ПЕРЕХОД
function goTo(url, color) {
  const overlay = document.getElementById('overlay');
  overlay.style.background = color;
  overlay.classList.add('active');
  setTimeout(() => { window.location.href = url; }, 500);
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
